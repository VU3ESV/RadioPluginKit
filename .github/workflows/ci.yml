name: CI

# Build the contract package on every PR and on pushes to main. RadioPluginKit has
# no dependencies, so this is a plain SwiftPM build of both library products.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS 14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build -v

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: |
          if [ -d Tests ]; then
            swift test
          else
            echo "No test target — skipping."
          fi
